<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Gorilla's Caps Store</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#000;
text-align:center;
padding:30px;
}

header img{
width:200px;
}

h1{
color:#ff2b2b;
}

.productos{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.producto{
background:#1a1a1a;
border-radius:10px;
overflow:hidden;
text-align:center;
padding:10px;
}

.producto img{
width:100%;
}

.btn{
background:#25D366;
padding:12px 20px;
display:inline-block;
margin-top:10px;
border-radius:6px;
color:white;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<img src="logo gorillas caps.jpeg">
<h1>GORILLA'S CAPS</h1>
<p>Mochilas Urbanas Premium</p>
</header>

<section class="productos">

<div class="producto">
<img src="mochila verde.jpeg">
<h3>Mochila Verde</h3>
<a class="btn" href="https://wa.me/56982328639">Comprar por WhatsApp</a>
</div>

<div class="producto">
<img src="mochila blanca.jpeg">
<h3>Mochila Blanca</h3>
<a class="btn" href="https://wa.me/56982328639">Comprar por WhatsApp</a>
</div>

<div class="producto">
<img src="mochila mostaza.jpeg">
<h3>Mochila Mostaza</h3>
<a class="btn" href="https://wa.me/56982328639">Comprar por WhatsApp</a>
</div>

<div class="producto">
<img src="mochila morado blanco.jpeg">
<h3>Mochila Graffiti</h3>
<a class="btn" href="https://wa.me/56982328639">Comprar por WhatsApp</a>
</div>

</section>

</body>
</html>

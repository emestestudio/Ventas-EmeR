<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMESTÉ STORE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0b0b;
color:white;
}

/* HEADER */

header{

text-align:center;

padding:70px 20px;

background:black;

}

header img{

width:380px;

animation:fadeIn 1.5s;

}

header p{

color:#bbb;

margin-top:10px;

}

/* HERO */

.hero{

text-align:center;

padding:40px;

background:linear-gradient(black,#111);

}

.hero h1{

font-size:40px;

color:#e6c06a;

}

.hero p{

color:#aaa;

}

/* TITULO */

.titulo{

text-align:center;

font-size:32px;

margin:60px 0 30px;

color:#e6c06a;

}

/* GRID */

.grid{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(300px,1fr));

gap:40px;

max-width:1400px;

margin:auto;

padding:20px;

}

/* PRODUCTO */

.producto{

background:#141414;

border-radius:16px;

overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,0.6);

transition:0.4s;

position:relative;

}

.producto:hover{

transform:translateY(-8px) scale(1.03);

}

.producto img{

width:100%;

}

/* INFO */

.info{

padding:20px;

}

.info h3{

margin:0 0 10px;

}

.info p{

color:#aaa;

font-size:14px;

}

/* PRECIO */

.precio{

font-size:22px;

color:#e6c06a;

margin-top:10px;

}

/* PRECIO ANTIGUO */

.precio-antiguo{

text-decoration:line-through;

color:#777;

font-size:14px;

}

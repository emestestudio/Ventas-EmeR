<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Emesté</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:linear-gradient(135deg,#000,#1a0025,#000);
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:rgba(0,0,0,0.7);
backdrop-filter:blur(10px);
position:fixed;
width:100%;
}

.logo{
font-size:30px;
font-weight:700;
color:#ff2ea6;
}

nav a{
color:white;
margin:0 20px;
text-decoration:none;
}

/* HERO */

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:radial-gradient(circle,#8b2eff,#000);
}

.hero h1{
font-size:70px;
background:linear-gradient(45deg,#ff2ea6,#8b2eff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
padding:15px 35px;
border-radius:40px;
background:linear-gradient(45deg,#ff2ea6,#8b2eff);
color:white;
border:none;
font-size:18px;
cursor:pointer;
}

/* PRODUCTOS */

.productos{
padding:100px 10%;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:#111;
border-radius:20px;
padding:20px;
transition:.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px #ff2ea6;
}

.card img{
width:100%;
border-radius:15px;
}

/* OFERTAS */

.ofertas{
padding:80px;
background:linear-gradient(45deg,#8b2eff,#ff2ea6);
text-align:center;
border-radius:20px;
margin:100px;
}

/* MAPA */

.mapa{
padding:100px 10%;
}

iframe{
width:100%;
height:400px;
border:none;
border-radius:20px;
}

/* WHATSAPP */

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
text-decoration:none;
color:white;
}

</style>

</head>

<body>

<header>

<div class="logo">Emesté</div>

<nav>
<a href="#">Inicio</a>
<a href="#">Catálogo</a>
<a href="#">Ofertas</a>
<a href="#">Ubicación</a>
</nav>

</header>

<section class="hero">

<div>
<h1>EMESTÉ</h1>
<p>Moda & Estilo Exclusivo</p>
<button class="btn">Ver catálogo</button>
</div>

</section>

<section class="productos">

<h2>Productos destacados</h2>

<div class="grid">

<div class="card">
<img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30">
<h3>Reloj elegante</h3>
<p>$29.990</p>
<button class="btn">Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Bolso chic</h3>
<p>$24.990</p>
<button class="btn">Comprar</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f">
<h3>Fragancia deluxe</h3>
<p>$19.990</p>
<button class="btn">Comprar</button>
</div>

</div>

</section>

<section class="ofertas">

<h2>Ofertas especiales</h2>

<p>Descuentos imperdibles esta semana</p>

<button class="btn">Ver ofertas</button>

</section>

<section class="mapa">

<h2>Visítanos</h2>

<p>Veteranos del 79 #1175</p>

<iframe src="https://maps.google.com/maps?q=Veteranos%20del%2079%201175&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>

</section>

<a class="whatsapp" href="https://wa.me/56982328639">💬</a>

</body>
</html>

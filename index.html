<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EMESTÉ Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#0a0a0a;
color:white;
}

/* NAV */

header{

display:flex;
justify-content:space-between;
align-items:center;
padding:20px 10%;
background:black;

}

.logo{

font-size:28px;
font-weight:700;
background:linear-gradient(45deg,#ff00cc,#8a2be2);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

nav a{

color:white;
margin-left:25px;
text-decoration:none;

}

/* HERO */

.hero{

height:500px;
display:flex;
align-items:center;
padding-left:10%;

background:
linear-gradient(90deg,#000 30%,transparent),
url("https://images.unsplash.com/photo-1520975916090-3105956dac38");

background-size:cover;

}

.hero h1{

font-size:60px;

}

.hero button{

margin-top:20px;
padding:15px 30px;
background:linear-gradient(45deg,#ff00cc,#8a2be2);
border:none;
color:white;
font-weight:600;
cursor:pointer;

}

/* PRODUCTOS */

.products{

padding:70px 10%;
text-align:center;

}

.products h2{

margin-bottom:40px;
color:#ff00cc;

}

.grid{

display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;

}

.card{

background:#111;
padding:20px;
border-radius:10px;
transition:.3s;

}

.card:hover{

transform:translateY(-10px);

}

.card img{

width:100%;
height:200px;
object-fit:cover;

}

.price{

color:#ff00cc;
font-weight:bold;

}

.card button{

margin-top:10px;
padding:12px;
border:none;
background:linear-gradient(45deg,#ff00cc,#8a2be2);
color:white;
cursor:pointer;
width:100%;

}

/* CARRITO */

.cart{

position:fixed;
right:0;
top:0;
height:100%;
width:320px;
background:#111;
padding:20px;
transform:translateX(100%);
transition:.4s;
overflow:auto;

}

.cart.active{

transform:translateX(0);

}

.cart h2{

color:#ff00cc;

}

.cart-item{

margin-top:15px;
border-bottom:1px solid #333;
padding-bottom:10px;

}

/* BOTON CARRITO */

.cart-btn{

position:fixed;
bottom:30px;
right:30px;
background:linear-gradient(45deg,#ff00cc,#8a2be2);
padding:15px;
border-radius:50%;
cursor:pointer;

}

/* PAGOS */

.payments{

padding:40px;
text-align:center;
background:#050505;

}

.payments img{

height:40px;
margin:10px;

}

/* FOOTER */

footer{

text-align:center;
padding:30px;
background:black;

}

</style>

</head>

<body>

<header>

<div class="logo">EMESTÉ</div>

<nav>

<a href="#">Inicio</a>
<a href="#">Moda</a>
<a href="#">Tecnología</a>
<a href="#">Ofertas</a>

</nav>

</header>



<section class="hero">

<div>

<h1>EMESTÉ</h1>

<p>La elección al alcance de tus manos</p>

<button>Comprar ahora</button>

</div>

</section>



<section class="products">

<h2>Productos Destacados</h2>

<div class="grid">

<div class="card">

<img src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b">

<h3>Gorro EMESTÉ</h3>

<p class="price">$12.990</p>

<button onclick="addCart('Gorro EMESTÉ',12990)">Agregar al carrito</button>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1518444028785-8fbcd101ebb9">

<h3>Audífonos Bluetooth</h3>

<p class="price">$28.990</p>

<button onclick="addCart('Audifonos',28990)">Agregar al carrito</button>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1546868871-7041f2a55e12">

<h3>Smartwatch</h3>

<p class="price">$29.990</p>

<button onclick="addCart('Smartwatch',29990)">Agregar al carrito</button>

</div>


<div class="card">

<img src="https://images.unsplash.com/photo-1581605405669-fcdf81165afa">

<h3>Mochila Urbana</h3>

<p class="price">$24.990</p>

<button onclick="addCart('Mochila',24990)">Agregar al carrito</button>

</div>

</div>

</section>



<div class="cart" id="cart">

<h2>Carrito</h2>

<div id="cart-items"></div>

<h3 id="total"></h3>

</div>



<div class="cart-btn" onclick="toggleCart()">

🛒

</div>



<section class="payments">

<h3>Métodos de pago</h3>

<img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg">

<img src="https://upload.wikimedia.org/wikipedia/commons/b/b7/MasterCard_Logo.svg">

<img src="https://upload.wikimedia.org/wikipedia/commons/0/04/MercadoPago_logo.svg">

</section>



<footer>

© 2026 EMESTÉ Store

</footer>



<script>

let cart=[]

function addCart(name,price){

cart.push({name,price})

renderCart()

}

function renderCart(){

let container=document.getElementById("cart-items")

container.innerHTML=""

let total=0

cart.forEach(item=>{

total+=item.price

container.innerHTML+=`

<div class="cart-item">

${item.name} - $${item.price}

</div>

`

})

document.getElementById("total").innerText="Total: $"+total

}

function toggleCart(){

document.getElementById("cart").classList.toggle("active")

}

</script>

</body>
</html>
